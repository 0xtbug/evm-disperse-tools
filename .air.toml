root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -ldflags=\"-X github.com/0xtbug/evm-disperse-tools/internal/version.Version=dev\" -o ./tmp/evm-disperse-tools.exe ./cmd/evm-disperse-tools/main.go"
bin = "tmp/evm-disperse-tools.exe"
full_bin = "tmp/evm-disperse-tools.exe"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["tmp", "vendor", "testdata"]
delay = 1000
stop_on_error = true
send_interrupt = true
kill_delay = 500

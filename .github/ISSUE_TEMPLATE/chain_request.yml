name: Chain Request
description: Request support for a new EVM chain
title: "[Chain] "
labels: ["chain-request"]
body:
  - type: input
    id: chain_name
    attributes:
      label: Chain Name
      description: Name of the blockchain network
      placeholder: e.g. Arbitrum, Optimism, Avalanche
    validations:
      required: true

  - type: input
    id: chain_id
    attributes:
      label: Chain ID
      description: EVM chain ID
      placeholder: e.g. 42161
    validations:
      required: true

  - type: input
    id: rpc_url
    attributes:
      label: Public RPC URL
      description: A public or free RPC endpoint for this chain
      placeholder: e.g. https://arb1.arbitrum.io/rpc
    validations:
      required: true

  - type: input
    id: native_token
    attributes:
      label: Native Token Symbol
      description: The native gas token of this chain
      placeholder: e.g. ETH, AVAX, MATIC
    validations:
      required: true

  - type: input
    id: explorer
    attributes:
      label: Block Explorer URL
      description: Block explorer for verifying transactions
      placeholder: e.g. https://arbiscan.io
    validations:
      required: false

  - type: textarea
    id: reason
    attributes:
      label: Why this chain?
      description: Briefly explain why you need this chain supported
    validations:
      required: false

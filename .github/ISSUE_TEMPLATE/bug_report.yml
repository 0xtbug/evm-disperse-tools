name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Select '...'
        3. Press '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or logs.
    validations:
      required: true

  - type: input
    id: chain
    attributes:
      label: Chain
      description: Which chain were you using?
      placeholder: e.g. Polygon, Ethereum, BNB Chain
    validations:
      required: false

  - type: input
    id: mode
    attributes:
      label: Mode
      description: Were you sending native or ERC20 tokens?
      placeholder: e.g. Native, ERC20
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. Windows 11, macOS 15, Ubuntu 24.04
    validations:
      required: false

  - type: input
    id: go_version
    attributes:
      label: Go Version
      placeholder: e.g. 1.24.0
    validations:
      required: false

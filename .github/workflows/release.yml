name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Validate and push tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must match format vX.Y.Z (e.g. v1.0.0)"
            exit 1
          fi
          git tag "$VERSION"
          git push origin "$VERSION"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build all platforms
        env:
          VERSION: ${{ inputs.version || github.event.workflow_run.head_branch || github.ref_name }}
        run: |
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w -X github.com/0xtbug/evm-disperse-tools/internal/version.Version=${VERSION}" -o dist/evm-disperse-tools-linux-amd64 ./cmd/evm-disperse-tools
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w -X github.com/0xtbug/evm-disperse-tools/internal/version.Version=${VERSION}" -o dist/evm-disperse-tools-linux-arm64 ./cmd/evm-disperse-tools
          GOOS=darwin   GOARCH=amd64 go build -ldflags="-s -w -X github.com/0xtbug/evm-disperse-tools/internal/version.Version=${VERSION}" -o dist/evm-disperse-tools-darwin-amd64 ./cmd/evm-disperse-tools
          GOOS=darwin   GOARCH=arm64 go build -ldflags="-s -w -X github.com/0xtbug/evm-disperse-tools/internal/version.Version=${VERSION}" -o dist/evm-disperse-tools-darwin-arm64 ./cmd/evm-disperse-tools
          GOOS=windows  GOARCH=amd64 go build -ldflags="-s -w -X github.com/0xtbug/evm-disperse-tools/internal/version.Version=${VERSION}" -o dist/evm-disperse-tools-windows-amd64.exe ./cmd/evm-disperse-tools

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.version || github.event.workflow_run.head_branch || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/evm-disperse-tools-linux-amd64
            dist/evm-disperse-tools-linux-arm64
            dist/evm-disperse-tools-darwin-amd64
            dist/evm-disperse-tools-darwin-arm64
            dist/evm-disperse-tools-windows-amd64.exe
            dist/checksums.txt
